<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In</title>
  <style>
    /* Resetare completă și fundalul întunecat cu imagine */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.85)), 
                  url('https://unsplash.com') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      color: #cccccc;
      padding: 60px 20px 40px 20px;
    }

    /* Containerul principal centrat pentru Login și Tastatură */
    .container.content-container {
      width: 100%;
      max-width: 800px;
      margin: auto 0;
    }

    .login-status {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 60px;
    }

    /* Zona din stânga: Titlu Login și Input */
    .title-area {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .heading {
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Zona de introducere a parolei cu linie fină la bază */
    .login-form {
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      max-width: 320px;
      width: 100%;
    }

    .login-pass {
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 42px;
      letter-spacing: 8px;
      width: 75%;
      height: 50px;
      padding: 0;
      outline: none;
    }

    .reset {
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding-bottom: 5px;
      opacity: 0.7;
      transition: opacity 0.2s;
      text-transform: lowercase;
    }

    .reset:hover {
      opacity: 1;
    }

    /* Zona din dreapta: Tastatura numerică */
    .content-area {
      flex: 1;
      display: flex;
      justify-content: center;
      min-width: 240px;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 75px);
      gap: 20px 25px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    /* Butoanele rotunde transparente (Outline) */
    .num.cbutton {
      width: 75px;
      height: 75px;
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .num.cbutton:hover {
      border-color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.05);
    }

    .num.cbutton:active {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Centrarea tastei 0 pe rândul ei */
    .num[data-num="0"] {
      grid-column: 2;
    }

    /* Stilul elegant pentru Citat jos pe centru */
    blockquote {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
      max-width: 600px;
      margin: 40px auto 0 auto;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Optimizare aspect pentru ecrane de telefon mobil */
    @media (max-width: 768px) {
      body {
        justify-content: center;
        padding: 40px 20px;
      }
      .login-status {
        flex-direction: column;
        gap: 45px;
      }
      .title-area {
        align-items: center;
      }
      .login-form {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

    <!-- Zona centrală: Autentificarea -->
    <div class="container content-container">
        <div class="login-status" id="loginWrapper">
            
            <!-- Stânga: Câmpul de Login text -->
            <div class="title-area login-title-area">
                <h1 class="heading">Log In</h1>
                <div class="login-form">
                    <input id="realpass" type="hidden" name="password">
                    <input id="showpass" type="text" disabled class="login-pass">
                    <a href="#" class="reset">clear</a>
                </div>
            </div>

            <!-- Dreapta: Blocul cu tastele rotunde -->
            <div class="content-area">
                <ul class="numpad">
                    <button class="num cbutton" data-num="1">1</button>
                    <button class="num cbutton" data-num="2">2</button>
                    <button class="num cbutton" data-num="3">3</button>
                    <button class="num cbutton" data-num="4">4</button>
                    <button class="num cbutton" data-num="5">5</button>
                    <button class="num cbutton" data-num="6">6</button>
                    <button class="num cbutton" data-num="7">7</button>
                    <button class="num cbutton" data-num="8">8</button>
                    <button class="num cbutton" data-num="9">9</button>
                    <button class="num cbutton" data-num="0">0</button>
                </ul>
            </div>

        </div>
    </div>

    <!-- Zona de jos: Citatul lui Kant -->
    <blockquote>„Cerul înstelat deasupra mea și legea morală în mine.”</blockquote>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const realPassInput = document.getElementById("realpass");
    const showPassInput = document.getElementById("showpass");
    const numButtons = document.querySelectorAll(".numpad .num");
    const resetButtons = document.querySelectorAll(".reset");

    // Rețeaua completă cu cele 50 de redirecționări externe
    const redirects = {
        "745638": "https://blackcube.com",
        "123456789": "https://google.com",
        "9927653": "https://group-ib.com",
        "48201": "https://hakluytandco.com",
        "93561": "https://k2integrity.com",
        "10754": "https://controlrisks.com",
        "856302": "https://fusiongps.com",
        "319475": "https://g3.co",
        "720491": "https://kroll.com",
        "503926": "https://diligence.com",
        "4056291": "https://aperio-intelligence.com",
        "8391054": "https://vantageintelligence.com",
        "1605384": "https://greyhawk.com",
        "30875914": "https://veracityworldwide.com",
        "92541036": "https://gryphon-strategies.com",
        "1092847": "https://schillingspartners.com",
        "5829104": "https://alaco.com",
        "7492051": "https://gpw.co",
        "6301952": "https://sirenmaritime.com",
        "29104857": "https://baerkarrer.ch",
        "61492758": "https://boozallen.com",
        "74591036": "https://leidos.com",
        "18503694": "https://caci.com",
        "59281740": "https://palantir.com",
        "84017359": "https://gdit.com",
        "2019485": "https://sygnia.co",
        "4920185": "https://mandiant.com",
        "8593021": "https://crowdstrike.com",
        "3029481": "https://checkpoint.com",
        "7105938": "https://cellointelligence.com",
        "2957106": "https://adit.fr",
        "7149352": "https://blackpeakgroup.com",
        "49106275": "https://corporaterisk.com",
        "83529146": "https://wallbrook.com",
        "17640359": "https://raedas.com",
        "5029184": "https://riskadvisory.com",
        "6104928": "https://sloaneworldwide.com",
        "8392015": "https://eurasiagroup.net",
        "2940185": "https://jsheld.com",
        "7104927": "https://ankura.com",
        "3920194": "https://garda.com",
        "8594021": "https://constellis.com",
        "4029185": "https://cbrnteam.com",
        "6930291": "https://flashpoint.io",
        "7201948": "https://recordedfuture.com",
        "8204915": "https://bellingcat.com",
        "1029485": "https://intelligencefusion.co.uk",
        "9302914": "https://intel471.com",
        "5830291": "https://zerofox.com",
        "40294812": "https://guidepostsolutions.com"
    };

    // Adăugare cifre la apăsare
    numButtons.forEach(button => {
        button.addEventListener("click", function() {
            const digit = this.getAttribute("data-num");
            realPassInput.value += digit;
            showPassInput.value += "*";

            const currentCode = realPassInput.value;

            // Verificare potrivire pentru redirecționările externe
            if (redirects[currentCode]) {
                window.location.href = redirects[currentCode];
                return;
            }
            
            // AUTO-RESET: Golește ecranul la 9 caractere fără potrivire
            if (currentCode.length >= 9) {
                realPassInput.value = "";
                showPassInput.value = "";
            }
        });
    });

    // Resetarea manuală la apăsarea pe "clear"
    resetButtons.forEach(btn => {
        btn.addEventListener("click", function(e) {
            e.preventDefault();
            realPassInput.value = "";
            showPassInput.value = "";
        });
    });
});
</script>

</body>
