<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In</title>
  <style>
    /* Resetare completă și fundalul întunecat cu imagine */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.85)), 
                  url('https://unsplash.com') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      color: #cccccc;
      padding: 60px 20px 40px 20px;
    }

    /* Containerul principal centrat pentru Login și Tastatură */
    .container.content-container {
      width: 100%;
      max-width: 800px;
      margin: auto 0;
    }

    .login-status {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 60px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    /* Zona din stânga: Titlu Login și Input */
    .title-area {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .heading {
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Zona de introducere a parolei cu linie fină la bază */
    .login-form {
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      max-width: 320px;
      width: 100%;
    }

    .login-pass {
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 42px;
      letter-spacing: 8px;
      width: 75%;
      height: 50px;
      padding: 0;
      outline: none;
    }

    .reset {
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding-bottom: 5px;
      opacity: 0.7;
      transition: opacity 0.2s;
      text-transform: lowercase;
    }

    .reset:hover {
      opacity: 1;
    }

    /* Zona din dreapta: Tastatura numerică */
    .content-area {
      flex: 1;
      display: flex;
      justify-content: center;
      min-width: 240px;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 75px);
      gap: 20px 25px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    /* Butoanele rotunde transparente (Outline) */
    .num.cbutton {
      width: 75px;
      height: 75px;
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .num.cbutton:hover {
      border-color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.05);
    }

    .num.cbutton:active {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Centrarea tastei 0 pe rândul ei */
    .num[data-num="0"] {
      grid-column: 2;
    }

    /* STIL PANOU SECRET (Ascuns inițial) */
    .secret-panel {
      display: none;
      width: 100%;
      max-width: 500px;
      background: rgba(30, 30, 30, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 12px;
      margin: auto 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .secret-panel.active {
      display: block;
      opacity: 1;
      transform: scale(1);
    }

    .secret-panel h2 {
      color: #00ffcc;
      margin-top: 0;
      font-size: 24px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 15px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #888888;
      margin-bottom: 8px;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 12px;
      color: #ffffff;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      font-family: inherit;
    }

    .form-group input:focus, .form-group textarea:focus {
      border-color: #00ffcc;
    }

    .btn-send {
      width: 100%;
      background: #00ffcc;
      color: #121212;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .btn-send:hover {
      background: #00ccaa;
    }

    /* Stilul elegant pentru Citat jos pe centru */
    blockquote {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
      max-width: 600px;
      margin: 40px auto 0 auto;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Optimizare aspect pentru ecrane de telefon mobil */
    @media (max-width: 768px) {
      body {
        justify-content: center;
        padding: 40px 20px;
      }
      .login-status {
        flex-direction: column;
        gap: 45px;
      }
      .title-area {
        align-items: center;
      }
      .login-form {
        margin: 0 auto;
      }
    }
  </style>
</head>

    <!-- Zona de jos: Citatul lui Kant -->
    <blockquote>„Cerul înstelat deasupra mea și legea morală în mine.”</blockquote>
